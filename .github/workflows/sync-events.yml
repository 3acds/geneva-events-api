name: Sync Geneva events

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-events.yml"
      - "api/requirements.txt"
      - "scraper/**"
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-geneva-events
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r api/requirements.txt
      - name: Verify Firebase configuration
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: test -n "$FIREBASE_CREDENTIALS_JSON" || (echo "::error::Add FIREBASE_CREDENTIALS_JSON as a repository secret" && exit 1)
      - name: Scrape and synchronize Firestore
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python -m scraper.scrape_articles --prune
